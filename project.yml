name: Rally
options:
  bundleIdPrefix: com.mahir
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "15"

packages:
  FirebaseFirestore:
    url: https://github.com/firebase/firebase-ios-sdk
    from: "11.0.0"
  GoogleSignIn:
    url: https://github.com/google/GoogleSignIn-iOS
    from: "7.0.0"

targets:
  Rally:
    type: application
    platform: iOS
    sources:
      - Rally
    resources:
      - Rally/GoogleService-Info.plist
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.mahir.rally
        SWIFT_VERSION: "5.10"
        TARGETED_DEVICE_FAMILY: "1"
        INFOPLIST_FILE: Rally/Info.plist
    dependencies:
      - package: FirebaseFirestore
        product: FirebaseFirestore
      - package: FirebaseFirestore
        product: FirebaseAuth
      - package: GoogleSignIn
        product: GoogleSignIn
      - package: GoogleSignIn
        product: GoogleSignInSwift
    entitlements:
      path: Rally/Rally.entitlements
