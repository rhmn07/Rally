name: Rally
options:
  bundleIdPrefix: com.mahir
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "15"

packages:
  FirebaseFirestore:
    url: https://github.com/firebase/firebase-ios-sdk
    from: "11.0.0"

targets:
  Rally:
    type: application
    platform: iOS
    sources:
      - Rally
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.mahir.rally
        SWIFT_VERSION: "5.10"
        TARGETED_DEVICE_FAMILY: "1"
        INFOPLIST_FILE: Rally/Info.plist
    dependencies:
      - package: FirebaseFirestore
        product: FirebaseFirestore
      - package: FirebaseFirestore
        product: FirebaseAuth
      - package: FirebaseFirestore
        product: FirebaseStorage
    entitlements:
      path: Rally/Rally.entitlements
      properties:
        com.apple.developer.applesignin:
          - Default
